<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Threads - Interactive Wait</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    background:#000; color:#fff;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    overflow:hidden; touch-action: none;
    transition: background 0.5s ease;
}

body.danger { background: #1a0505; }

.center {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); text-align:center; width: 100%;
}

.hidden { display:none !important; }

/* ===== Threads Homepage Style ===== */
.logo { font-size: 80px; font-weight: 700; letter-spacing: -2px; margin-bottom: 20px; }
.loading-ring {
    width: 22px; height: 22px; border: 1.5px solid rgba(255,255,255,0.1);
    border-top: 1.5px solid #fff; border-radius: 50%;
    margin: 20px auto; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.home-text { font-size: 14px; opacity: 0.4; font-weight: 300; letter-spacing: 0.2px; line-height: 1.6; }

button {
    margin-top: 40px; padding: 10px 32px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15);
    background: #fff; color: #000; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
}
button:active { transform: scale(0.96); opacity: 0.8; }

/* ===== Game Elements ===== */
#gameArea { width:100vw; height:100vh; position:relative; }
.dot {
    width:50px; height:50px; border-radius:50%; background:#fff; position:absolute; cursor:pointer;
    animation: shrinkVar var(--duration) linear forwards;
}
@keyframes shrinkVar {
    0% { transform: scale(0); opacity: 0; }
    15% { transform: scale(1); opacity: 1; }
    85% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}
.burst {
    position:absolute; width:50px; height:50px; border-radius:50%; border:1px solid #fff;
    pointer-events: none; animation: burstOut 0.4s ease-out forwards;
}
@keyframes burstOut { to { transform:scale(2); opacity:0; } }

#hud { position:fixed; top:50px; left:30px; font-size:12px; font-weight: 400; letter-spacing: 0.8px; z-index: 100; pointer-events: none; }
#hud div { margin-bottom: 8px; opacity: 0.3; }
#life { font-size: 18px; opacity: 1 !important; margin-top: 12px; transition: 0.3s; }

/* ===== Result Card (Fixed Centering) ===== */
#result.center {
    display: flex; justify-content: center; align-items: center;
    width: 100vw; height: 100vh;
}
.card {
    background: rgba(255,255,255,0.05); padding: 40px 30px; border-radius: 28px;
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    width: 90%; max-width: 360px; margin: 0 auto;
    border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.card h2 { font-size: 19px; font-weight: 600; margin-bottom: 6px; }
#leaderboard { margin: 25px 0; text-align: left; }
.lb-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.lb-row:last-child { border-bottom: none; }

.shake { animation: shakeAnim 0.2s ease-in-out; }
@keyframes shakeAnim { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 0); } 75% { transform: translate(5px, 0); } }
</style>
</head>
<body>

<div id="homepage" class="center">
    <div class="logo">@</div>
    <div id="homeStatus">
        <div class="loading-ring"></div>
        <div class="home-text">Connecting to your feed...</div>
    </div>
    <div id="homeAction" class="hidden">
        <div class="home-text">The feed is currently refreshing.<br>Stay with us for a moment.</div>
        <button onclick="startGame()">Interactive Wait</button>
    </div>
</div>

<div id="game" class="hidden">
    <div id="gameArea"></div>
    <div id="hud">
        <div>SCORE <b id="score">0</b></div>
        <div>SESSION <span id="time">0.0</span>s</div>
        <div id="life"></div>
    </div>
</div>

<div id="result" class="center hidden">
    <div class="card">
        <h2>Session Summary</h2>
        <div id="finalStat" style="font-size:13px; opacity:0.4; margin-bottom:10px;"></div>
        <div id="leaderboard"></div>
        <button onclick="goHome()" style="width:100%; background:transparent; border:1px solid rgba(255,255,255,0.2); color:#fff;">Dismiss</button>
        <button onclick="retryGame()" style="width:100%; margin-top:10px;">Retry</button>
    </div>
</div>

<script>
let state = { score: 0, time: 0, speed: 1100, lives: 5, active: false, combo: 0 };
let audioCtx, gameLoopTimeout, clockInterval;

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playBeep(freq, dur = 0.12) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = "sine"; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}

// 首頁 Loading 模擬
let homeTimer = setTimeout(() => {
    document.getElementById('homeStatus').classList.add('hidden');
    document.getElementById('homeAction').classList.remove('hidden');
}, 2000);

function startGame() {
    initAudio(); state.active = true;
    document.getElementById('homepage').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    document.getElementById('result').classList.add('hidden');
    updateUI();
    runLoop();
    clearInterval(clockInterval);
    clockInterval = setInterval(() => { if(!state.active) return; state.time += 0.1; document.getElementById('time').innerText = state.time.toFixed(1); }, 100);
}

function runLoop() {
    if (!state.active) return;
    spawn();
    state.speed = Math.max(380, state.speed * 0.982);
    gameLoopTimeout = setTimeout(runLoop, state.speed);
}

function spawn() {
    if (!state.active) return;
    const dot = document.createElement("div");
    dot.className = "dot";
    const x = Math.random() * (window.innerWidth - 70) + 10;
    const y = Math.random() * (window.innerHeight - 150) + 60;
    const duration = state.speed * 1.8;
    dot.style.setProperty('--duration', `${duration}ms`);
    dot.style.left = `${x}px`; dot.style.top = `${y}px`;

    dot.onpointerdown = (e) => {
        if (!state.active) return; e.stopPropagation();
        if (state.lives < 5) state.lives++;
        state.combo++; state.score += (10 + Math.floor(state.combo / 5) * 5);
        playBeep(440 + (state.combo * 8)); createBurst(x, y); dot.remove(); updateUI();
    };

    document.getElementById('gameArea').appendChild(dot);
    setTimeout(() => {
        if (dot.parentNode && state.active) {
            dot.remove(); state.lives--; state.combo = 0;
            if (state.lives > 0) { playBeep(180, 0.2); document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 200); }
            updateUI(); if (state.lives <= 0) endGame();
        }
    }, duration);
}

function createBurst(x, y) {
    const b = document.createElement("div"); b.className = "burst";
    b.style.left = `${x}px`; b.style.top = `${y}px`;
    document.getElementById('gameArea').appendChild(b); setTimeout(() => b.remove(), 400);
}

function updateUI() {
    document.getElementById('score').innerText = state.score;
    document.getElementById('life').innerText = "♥".repeat(state.lives);
    state.lives === 1 ? document.body.classList.add('danger') : document.body.classList.remove('danger');
}

function endGame() {
    if (!state.active) return;
    state.active = false; document.body.classList.remove('danger');
    clearTimeout(gameLoopTimeout); clearInterval(clockInterval);
    document.getElementById('game').classList.add("hidden");
    document.getElementById('result').classList.remove("hidden");
    document.getElementById('finalStat').innerText = `${state.time.toFixed(1)}s uptime • Score ${state.score}`;
    generateLeaderboard();
}

function goHome() {
    document.getElementById('result').classList.add("hidden");
    document.getElementById('homepage').classList.remove("hidden");
    // 重置首頁狀態
    document.getElementById('homeStatus').classList.remove('hidden');
    document.getElementById('homeAction').classList.add('hidden');
    clearTimeout(homeTimer);
    homeTimer = setTimeout(() => {
        document.getElementById('homeStatus').classList.add('hidden');
        document.getElementById('homeAction').classList.remove('hidden');
    }, 2000);
}

function retryGame() {
    state.score = 0; state.time = 0; state.speed = 1100; state.lives = 5; state.combo = 0;
    startGame();
}

function generateLeaderboard() {
    const bots = ["luna", "alex", "noah", "mia", "zen"].map(n => ({ name: n, score: Math.floor(Math.random() * 1500) + 500 }));
    bots.push({ name: "YOU", score: state.score, isPlayer: true });
    bots.sort((a, b) => b.score - a.score);
    let html = `<div style="font-size:11px; opacity:0.3; text-transform:uppercase; margin-bottom:5px; letter-spacing:1px; font-weight:600;">Global Standing</div>`;
    bots.forEach((entry, i) => {
        const activeStyle = entry.isPlayer ? 'color:#fff; font-weight:600;' : 'opacity:0.4;';
        html += `<div class="lb-row" style="${activeStyle}"><span>${i + 1}. ${entry.name}</span><span>${entry.score}</span></div>`;
    });
    document.getElementById('leaderboard').innerHTML = html;
}
</script>

</body>
</html>
