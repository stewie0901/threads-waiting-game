<!DOCTYPE html>
<html>
<head>
    <title>v5 - Core Mechanic</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; margin: 0; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 10; }
        .dot { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; cursor: pointer; }
    </style>
</head>
<body>
    <div id="hud">Score: <span id="score">0</span></div>
    <div id="gameArea"></div>

    <script>
        let score = 0;
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');

        function spawnDot() {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            dot.style.top = Math.random() * (window.innerHeight - 50) + 'px';

            dot.onclick = () => {
                score += 10;
                scoreDisplay.innerText = score;
                dot.remove();
            };
            gameArea.appendChild(dot);
            // 3秒後沒點擊自動消失
            setTimeout(() => { if(dot.parentNode) dot.remove(); }, 3000);
        }
        setInterval(spawnDot, 1000);
    </script>
</body>
</html>
