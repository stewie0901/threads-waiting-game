<!DOCTYPE html>
<html>
<head>
    <title>v2 - Pulse</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .logo { font-size: 60px; animation: pulse 1.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .subtext { margin-top: 10px; opacity: 0.5; font-size: 14px; }
    </style>
</head>
<body>
    <div class="logo">@</div>
    <div class="subtext">Loading your feed...</div>
</body>
</html>
