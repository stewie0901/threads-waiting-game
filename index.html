<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Threads Waiting Pro - Ultra Edition</title>

<style>
/* 基礎重置與美化 */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    background:#000;
    color:#fff;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
    touch-action: none;
}

.center {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); text-align:center; width: 90%;
}

.hidden { display:none !important; }

/* 平滑進場動畫 */
.fade {
    animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

@keyframes fadeIn {
    from { opacity:0; transform:translate(-50%,-45%) scale(0.95); }
    to { opacity:1; transform:translate(-50%,-50%) scale(1); }
}

/* Logo 脈衝 */
.logo {
    font-size:80px; font-weight: bold; opacity:0.85;
    animation: pulse 2s ease-in-out infinite; user-select: none;
}

@keyframes pulse {
    0%, 100% { opacity:0.3; transform: scale(0.9); }
    50% { opacity:1; transform: scale(1); }
}

.subtext { margin-top:15px; font-size:14px; opacity:0.5; letter-spacing: 0.5px; }

/* 按鈕樣式 */
button {
    margin-top:25px; padding:14px 32px; border-radius:999px; border:none;
    background:#fff; color:#000; font-weight: 600; cursor:pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
button:hover { transform:scale(1.05); background: #eee; }
button:active { transform:scale(0.95); }

/* 遊戲核心：全白美學 */
#gameArea { width:100vw; height:100vh; position:relative; }

.dot {
    width:50px; height:50px; border-radius:50%;
    background:#fff; position:absolute; cursor:pointer;
    animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

@keyframes pop {
    from { transform:scale(0); opacity:0; }
    to { transform:scale(1); opacity:1; }
}

/* 點擊與漏掉的反饋 */
.shake { animation: shake 0.3s ease-in-out; }
@keyframes shake {
    0%, 100% { transform: translate(0,0); }
    25% { transform: translate(-5px, 5px); }
    50% { transform: translate(5px, -5px); }
    75% { transform: translate(-5px, -5px); }
}

.burst {
    position:absolute; width:50px; height:50px; border-radius:50%;
    border:2px solid white; pointer-events: none;
    animation: burst 0.5s ease-out forwards;
}
@keyframes burst {
    to { transform:scale(2.5); opacity:0; border-width: 0px; }
}

/* HUD 質感 */
#hud {
    position:fixed; top:25px; left:25px;
    font-size:14px; font-variant-numeric: tabular-nums;
    text-transform: uppercase; letter-spacing: 1px;
    z-index: 100; pointer-events: none;
}
#hud div { margin-bottom: 5px; opacity: 0.7; }
#life { font-size: 18px; opacity: 1 !important; margin-top: 10px; color: #fff; }

/* 結算畫面 */
.card {
    background:rgba(255,255,255,0.08); padding:40px 30px;
    border-radius:24px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<div id="loading" class="center fade">
    <div class="logo">@</div>
    <div class="subtext">Optimizing feed...</div>
</div>

<div id="error" class="center hidden fade">
    <div style="font-size:22px; font-weight:600;">Server is slow.</div>
    <div class="subtext">Enjoy a minimal session while we load.</div>
    <button onclick="startGame()">Interactive Wait</button>
</div>

<div id="game" class="hidden">
    <div id="gameArea"></div>
    <div id="hud">
        <div>Score: <b id="score">0</b></div>
        <div>Time: <span id="time">0.0</span>s</div>
        <div id="life"></div>
    </div>
</div>

<div id="result" class="center hidden fade">
    <div class="card">
        <h2 style="margin-bottom:10px;">Session Summary</h2>
        <p id="finalScore" style="opacity:0.8; margin-bottom:20px;"></p>
        <div id="leaderboard" style="margin-bottom: 25px;"></div>
        <button onclick="location.reload()">Refresh Feed</button>
    </div>
</div>

<script>
const CONFIG = {
    initialSpeed: 1000,
    minSpeed: 380,
    speedFactor: 0.985, // 每次點擊速度變快 1.5%
    maxLives: 5
};

let state = {
    score: 0,
    time: 0,
    speed: CONFIG.initialSpeed,
    lives: CONFIG.maxLives,
    isActive: false
};

let timers = { game: null, clock: null };
let audioCtx;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

// 導航邏輯
setTimeout(() => {
    if(!state.isActive) {
        document.getElementById('loading').classList.add("hidden");
        document.getElementById('error').classList.remove("hidden");
    }
}, 2000);

function startGame() {
    initAudio();
    state.isActive = true;
    document.getElementById('error').classList.add("hidden");
    document.getElementById('game').classList.remove("hidden");

    updateLifeUI();
    gameLoop();

    timers.clock = setInterval(() => {
        state.time += 0.1;
        document.getElementById('time').innerText = state.time.toFixed(1);
    }, 100);
}

// 控制速度加快的核心循環
function gameLoop() {
    if (!state.isActive) return;
    spawnDot();
    // 每次生成後，間隔縮短（變快）
    state.speed = Math.max(CONFIG.minSpeed, state.speed * CONFIG.speedFactor);
    timers.game = setTimeout(gameLoop, state.speed);
}

function spawnDot() {
    const dot = document.createElement("div");
    dot.className = "dot";
    
    const size = 50;
    const x = Math.random() * (window.innerWidth - size);
    const y = Math.random() * (window.innerHeight - size);

    Object.assign(dot.style, { left: `${x}px`, top: `${y}px` });

    dot.onpointerdown = (e) => {
        e.stopPropagation();
        
        // --- 優化點：點到回血 ---
        if (state.lives < CONFIG.maxLives) {
            state.lives++;
            updateLifeUI();
        }

        state.score += 10;
        playSound(400 + (state.score / 2));
        createBurst(x, y);
        dot.remove();
        document.getElementById('score').innerText = state.score;
    };

    document.getElementById('gameArea').appendChild(dot);

    // 圓點生命週期：隨著遊戲變快，白點消失也變快
    setTimeout(() => {
        if (dot.parentNode) {
            dot.remove();
            state.lives--;
            playSound(180);
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 300);
            updateLifeUI();
            if (state.lives <= 0) endGame();
        }
    }, state.speed * 1.6);
}

function createBurst(x, y) {
    const b = document.createElement("div");
    b.className = "burst";
    b.style.left = `${x}px`; b.style.top = `${y}px`;
    document.getElementById('gameArea').appendChild(b);
    setTimeout(() => b.remove(), 500);
}

function updateLifeUI() {
    // 簡約心形：♥
    document.getElementById('life').innerText = "♥".repeat(state.lives);
}

function endGame() {
    state.isActive = false;
    clearTimeout(timers.game);
    clearInterval(timers.clock);

    document.getElementById('game').classList.add("hidden");
    document.getElementById('result').classList.remove("hidden");
    document.getElementById('finalScore').innerText = `Survived for ${state.time.toFixed(1)}s • Score ${state.score}`;
    
    generateLeaderboard();
}

function generateLeaderboard() {
    const bots = ["luna", "alex", "noah", "mia", "zen"].map(n => ({
        name: n, score: Math.floor(Math.random() * 1500) + 500
    }));
    bots.push({ name: "YOU", score: state.score, isPlayer: true });
    bots.sort((a, b) => b.score - a.score);

    let html = `<div style="font-size:12px; opacity:0.5; text-transform:uppercase; margin-bottom:10px;">Global Cache</div>`;
    bots.forEach((entry, i) => {
        const style = entry.isPlayer ? 'color:#fff; font-weight:bold;' : 'opacity:0.5;';
        html += `<div style="display:flex; justify-content:space-between; margin:8px 0; font-size:15px; ${style}">
            <span>${i + 1}. ${entry.name}</span>
            <span>${entry.score}</span>
        </div>`;
    });
    document.getElementById('leaderboard').innerHTML = html;
}
</script>

</body>
</html>
